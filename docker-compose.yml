version: '3.9'

services:

  # ── Backend (FastAPI) ──────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: medlinka-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - medlinka_db:/app/data
    environment:
      - DATABASE_URL=sqlite+aiosqlite:////app/data/medlinka.db
      - DEBUG=True
    env_file:
      - ./backend/.env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Dashboard (React/Vite) ─────────────────────────────
  dashboard:
    image: node:20-alpine
    container_name: medlinka-dashboard
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host"
    ports:
      - "3000:3000"
    volumes:
      - ./dashboard:/app
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  medlinka_db:
